<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0a"/>
      <stop offset="100%" style="stop-color:#1a1a1a"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect x="0" y="0" width="6" height="630" fill="#F5C518"/>
  <!-- Logo badge -->
  <rect x="60" y="60" width="80" height="80" rx="16" fill="#F5C518"/>
  <text x="100" y="115" text-anchor="middle" font-family="Arial Black,Arial,sans-serif" font-weight="900" font-size="48" fill="#0a0a0a">T</text>
  <!-- Brand name -->
  <text x="160" y="95" font-family="Arial Black,Arial,sans-serif" font-weight="900" font-size="36" fill="white" letter-spacing="4">TAREKION</text>
  <text x="160" y="125" font-family="Arial,sans-serif" font-weight="500" font-size="14" fill="#F5C518" letter-spacing="6">ESTABLISHMENT</text>
  <!-- Main headline -->
  <text x="60" y="300" font-family="Arial Black,Arial,sans-serif" font-weight="900" font-size="72" fill="white">Heavy Equipment</text>
  <text x="60" y="390" font-family="Arial Black,Arial,sans-serif" font-weight="900" font-size="72" fill="#F5C518">Rental in Saudi Arabia</text>
  <!-- Arabic -->
  <text x="1140" y="470" text-anchor="end" font-family="Arial,sans-serif" font-size="28" fill="rgba(255,255,255,0.4)">تأجير معدات ثقيلة في المملكة العربية السعودية</text>
  <!-- Equipment types -->
  <text x="60" y="530" font-family="Arial,sans-serif" font-size="20" fill="rgba(255,255,255,0.5)">JCB · Bobcat · Excavator · Bulldozer · Wheel Loader · Lowbed</text>
  <!-- Website -->
  <text x="60" y="590" font-family="Arial,sans-serif" font-weight="700" font-size="18" fill="rgba(255,255,255,0.35)">www.tarekion.com</text>
  <!-- WhatsApp badge -->
  <rect x="900" y="540" width="240" height="52" rx="12" fill="#F5C518"/>
  <text x="1020" y="572" text-anchor="middle" font-family="Arial Black,Arial,sans-serif" font-weight="900" font-size="18" fill="#0a0a0a">WhatsApp 24/7</text>
</svg>
