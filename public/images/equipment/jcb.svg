<svg width="800" height="600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0a0a0acc;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="shimmer" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#F5C518;stop-opacity:0.05" />
      <stop offset="50%" style="stop-color:#F5C518;stop-opacity:0.15" />
      <stop offset="100%" style="stop-color:#F5C518;stop-opacity:0.05" />
    </linearGradient>
  </defs>
  <rect width="800" height="600" fill="url(#bg)"/>
  <rect width="800" height="600" fill="url(#shimmer)"/>
  <!-- Equipment silhouette shapes -->
  <rect x="100" y="280" width="600" height="180" rx="8" fill="#F5C518" opacity="0.08"/>
  <!-- Wheels -->
  <circle cx="220" cy="440" r="70" fill="#F5C518" opacity="0.12"/>
  <circle cx="220" cy="440" r="45" fill="#F5C518" opacity="0.18"/>
  <circle cx="220" cy="440" r="20" fill="#F5C518" opacity="0.3"/>
  <circle cx="580" cy="440" r="70" fill="#F5C518" opacity="0.12"/>
  <circle cx="580" cy="440" r="45" fill="#F5C518" opacity="0.18"/>
  <circle cx="580" cy="440" r="20" fill="#F5C518" opacity="0.3"/>
  <!-- Body -->
  <rect x="160" y="300" width="480" height="130" rx="10" fill="#F5C518" opacity="0.12"/>
  <!-- Cab -->
  <rect x="420" y="230" width="180" height="110" rx="8" fill="#F5C518" opacity="0.18"/>
  <!-- Arm/boom -->
  <rect x="140" y="260" width="220" height="18" rx="6" fill="#F5C518" opacity="0.25" transform="rotate(-20 140 260)"/>
  <rect x="120" y="320" width="180" height="14" rx="5" fill="#F5C518" opacity="0.2" transform="rotate(15 120 320)"/>
  <!-- Grid lines -->
  <line x1="0" y1="0" x2="800" y2="600" stroke="#F5C518" stroke-width="0.5" opacity="0.05"/>
  <line x1="800" y1="0" x2="0" y2="600" stroke="#F5C518" stroke-width="0.5" opacity="0.05"/>
  <!-- Badge -->
  <rect x="30" y="30" width="180" height="44" rx="10" fill="#F5C518" opacity="0.9"/>
  <text x="120" y="48" text-anchor="middle" font-family="Arial Black,Arial,sans-serif" font-weight="900" font-size="11" fill="#0a0a0a" letter-spacing="2">TAREKION</text>
  <text x="120" y="65" text-anchor="middle" font-family="Arial,sans-serif" font-weight="600" font-size="9" fill="#0a0a0a" opacity="0.7" letter-spacing="1">HEAVY EQUIPMENT</text>
  <!-- Main label -->
  <text x="400" y="140" text-anchor="middle" font-family="Arial Black,Arial,sans-serif" font-weight="900" font-size="52" fill="#F5C518" opacity="0.9">JCB 3CX</text>
  <text x="400" y="195" text-anchor="middle" font-family="Arial,sans-serif" font-weight="600" font-size="20" fill="#F5C518" opacity="0.5">Backhoe Loader</text>
  <!-- Saudi flag colors subtle accent -->
  <rect x="0" y="570" width="800" height="30" fill="#F5C518" opacity="0.06"/>
</svg>